<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Manager — Bayfall Morrigan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  const firebaseConfig = {
    apiKey: "AIzaSyBzm8AMwRK8T_Mt54Ll8gCqmyMP33_oOxY",
    authDomain: "client-database-aeff2.firebaseapp.com",
    databaseURL: "https://client-database-aeff2-default-rtdb.firebaseio.com",
    projectId: "client-database-aeff2",
    storageBucket: "client-database-aeff2.firebasestorage.app",
    messagingSenderId: "667656292083",
    appId: "1:667656292083:web:0238cc4046fe8acd3c1986"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>
<style>
:root {
  --bg: #f5f3ee;
  --paper: #faf9f6;
  --ink: #1a1714;
  --ink2: #3d3830;
  --muted: #8c8577;
  --border: #ddd9d0;
  --border2: #c8c3b8;
  --green: #1d6b3e;
  --green-light: #e8f5ee;
  --red: #8b1a1a;
  --red-light: #f9eaea;
  --gold: #8b6914;
  --gold-light: #f7f0e0;
  --blue: #14508b;
  --blue-light: #e0eaf7;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --violet: #6b3fa0;
  --violet-light: #f3eeff;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Mono',monospace;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--ink);color:var(--bg);display:flex;align-items:stretch;height:52px;flex-shrink:0}
.topbar-logo{display:flex;align-items:center;padding:0 24px;border-right:1px solid #3d3830;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:2px;text-transform:uppercase;flex-shrink:0;flex-direction:column;justify-content:center}
.topbar-logo .sub{font-size:9px;letter-spacing:3px;color:#8c8577;font-weight:400}
.topbar-stats{display:flex;align-items:center;flex:1;padding:0 8px}
.ts-divider{width:1px;background:#3d3830;height:28px;flex-shrink:0;margin:0 4px}
.cap-stat{display:flex;flex-direction:column;justify-content:center;padding:0 16px}
.cap-stat label{font-size:8px;letter-spacing:2px;color:#8c8577;white-space:nowrap}
.cap-stat .val{font-family:'Syne';font-size:14px;font-weight:700;white-space:nowrap}
.val.green{color:#4caf50}.val.gold{color:#ffc107}.val.blue{color:#64b5f6}.val.red{color:#ef5350}
.topbar-actions{display:flex;align-items:center;gap:8px;padding:0 16px;border-left:1px solid #3d3830;flex-shrink:0}
.tbtn{padding:6px 14px;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1px;cursor:pointer;border:1px solid #3d3830;background:transparent;color:#8c8577;border-radius:3px;transition:all .15s;text-transform:uppercase}
.tbtn:hover{border-color:#8c8577;color:var(--bg)}
.tbtn.primary{background:var(--bg);color:var(--ink);border-color:var(--bg)}

/* WORKSPACE */
.workspace{display:grid;grid-template-columns:300px 1fr 420px;flex:1;overflow:hidden}

/* PANELS */
.panel{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--paper)}
.panel-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-family:'Syne';font-weight:700;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.panel-sub{font-size:9px;color:var(--muted);letter-spacing:1px}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px}

/* CLIENT LIST */
.client-card{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.client-card:hover{border-color:var(--border2)}
.client-card.selected{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
.cc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cc-name{font-family:'Syne';font-weight:700;font-size:12px}
.cc-badge{font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:10px}
.cc-badge.standard{background:var(--blue-light);color:var(--blue)}
.cc-badge.abu{background:var(--violet-light);color:var(--violet)}
.cc-badge.inactive{background:var(--amber-light);color:var(--amber)}
.cc-meta{font-size:9px;color:var(--muted)}
.add-client-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.add-btn-type{padding:8px;text-align:center;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);border-radius:3px;transition:all .15s;font-family:'IBM Plex Mono'}
.add-btn-type:hover{border-color:var(--ink);color:var(--ink)}
.add-btn-type.std-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.add-btn-type.abu-btn:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-light)}

/* MAIN AREA — contract view/editor */
.main-area{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.main-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--paper);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.main-title{font-family:'Syne';font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase}
.main-actions{display:flex;gap:6px}
.main-body{flex:1;overflow-y:auto;padding:20px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:8px}
.empty-icon{font-size:28px;opacity:.3}
.empty-text{font-size:9px;letter-spacing:2px;text-transform:uppercase}

/* FORM SECTIONS */
.form-section{margin-bottom:20px}
.form-section-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.form-grid.cols1{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.field input,.field select{width:100%;background:var(--paper);border:1px solid var(--border);border-radius:3px;padding:7px 9px;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink);outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:var(--ink2)}
.field .hint{font-size:9px;color:var(--muted);font-style:italic}
.calc-preview{background:var(--paper);border:1px solid var(--border);border-radius:3px;padding:12px;margin-top:8px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)}
.calc-row:last-child{border-bottom:none}
.calc-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.calc-val{font-family:'Syne';font-size:13px;font-weight:700}
.calc-val.green{color:var(--green)}.calc-val.gold{color:var(--gold)}.calc-val.blue{color:var(--blue)}.calc-val.violet{color:var(--violet)}

/* STATUS SELECTOR */
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:4px}
.status-opt{padding:6px 4px;text-align:center;font-size:8px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);border-radius:3px;transition:all .15s;font-family:'IBM Plex Mono'}
.status-opt.active[data-s="active"]{background:var(--green-light);border-color:var(--green);color:var(--green)}
.status-opt.active[data-s="inactive"]{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}
.status-opt.active[data-s="complete"]{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}

/* SAVE / ACTION BUTTONS */
.save-btn{padding:9px 20px;background:var(--ink);color:var(--bg);border:none;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:background .15s}
.save-btn:hover{background:var(--ink2)}
.danger-btn{padding:9px 16px;background:transparent;color:var(--red);border:1px solid var(--red-light);font-family:'IBM Plex Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .15s}
.danger-btn:hover{background:var(--red-light)}
.cancel-btn{padding:9px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);font-family:'IBM Plex Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px}
.cancel-btn:hover{border-color:var(--ink2);color:var(--ink)}

/* TRANSACTION PANEL */
.txn-panel{display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border);background:var(--paper)}
.txn-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.txn-add-form{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.txn-list{flex:1;overflow-y:auto;padding:10px 14px}
.txn-row{display:grid;grid-template-columns:90px 1fr 80px 24px;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.txn-row:last-child{border-bottom:none}
.txn-date{font-size:10px;color:var(--muted);letter-spacing:.5px}
.txn-desc{font-size:11px;color:var(--ink2)}
.txn-amt{font-family:'Syne';font-size:12px;font-weight:700;text-align:right}
.txn-amt.credit{color:var(--green)}.txn-amt.debit{color:var(--red)}.txn-amt.neutral{color:var(--muted)}
.txn-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;transition:color .15s;font-family:'IBM Plex Mono'}
.txn-del:hover{color:var(--red)}
.txn-empty{font-size:10px;color:var(--muted);font-style:italic;padding:12px 0}
.txn-type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.txn-type-opt{padding:5px;text-align:center;font-size:8px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);border-radius:3px;font-family:'IBM Plex Mono';transition:all .15s}
.txn-type-opt.active[data-t="credit"]{background:var(--green-light);border-color:var(--green);color:var(--green)}
.txn-type-opt.active[data-t="debit"]{background:var(--red-light);border-color:var(--red);color:var(--red)}
.txn-type-opt.active[data-t="neutral"]{background:var(--bg);border-color:var(--border2);color:var(--muted)}
.add-txn-btn{width:100%;padding:7px;background:var(--ink);color:var(--bg);border:none;font-family:'IBM Plex Mono';font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px}
.add-txn-btn:hover{background:var(--ink2)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:var(--bg);padding:9px 16px;border-radius:3px;font-size:10px;letter-spacing:1px;text-transform:uppercase;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}



::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">BAYFALL MORRIGAN<div class="sub">CONTRACT MANAGER</div></div>
  <div class="topbar-stats">
    <div class="cap-stat"><label>Total Clients</label><div class="val blue" id="stat-total">—</div></div>
    <div class="ts-divider"></div>
    <div class="cap-stat"><label>Active</label><div class="val green" id="stat-active">—</div></div>
    <div class="ts-divider"></div>
    <div class="cap-stat"><label>Inactive</label><div class="val gold" id="stat-inactive">—</div></div>
    <div class="ts-divider"></div>
    <div class="cap-stat"><label>Standard</label><div class="val blue" id="stat-std">—</div></div>
    <div class="ts-divider"></div>
    <div class="cap-stat"><label>ABU</label><div class="val" id="stat-abu" style="color:#9c7ad4">—</div></div>
    <div class="ts-divider"></div>
    <div class="cap-stat"><label>Firebase</label><div class="val" id="conn-status" style="color:#8c8577">—</div></div>
  </div>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- LEFT: CLIENT LIST -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Clients</div>
      <div class="panel-sub">Select to view or edit</div>
    </div>
    <div class="panel-body">
      <div class="add-client-btns">
        <div class="add-btn-type std-btn" onclick="startNewContract('standard')">+ Standard</div>
        <div class="add-btn-type abu-btn" onclick="startNewContract('abu')">+ ABU</div>
      </div>
      <div id="client-list"></div>
    </div>
  </div>

  <!-- CENTER: CONTRACT EDITOR -->
  <div class="main-area">
    <div class="main-header">
      <div class="main-title" id="main-title">Select a Client</div>
      <div class="main-actions" id="main-actions"></div>
    </div>
    <div class="main-body" id="main-body">
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-text">Select a client or create new</div>
      </div>
    </div>
  </div>

  <!-- RIGHT: TRANSACTIONS -->
  <div class="txn-panel">
    <div class="txn-header">
      <div class="panel-title">Transaction History</div>
      <div class="panel-sub" id="txn-client-name">No client selected</div>
    </div>
    <div class="txn-add-form" id="txn-add-form" style="display:none">
      <div class="field">
        <label>Date</label>
        <input type="date" id="txn-date">
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="txn-desc" placeholder="Weekly contribution...">
      </div>
      <div class="field">
        <label>Amount ($)</label>
        <input type="number" id="txn-amount" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Type</label>
        <div class="txn-type-row">
          <div class="txn-type-opt active" data-t="credit" onclick="selectTxnType(this)">Credit</div>
          <div class="txn-type-opt" data-t="debit" onclick="selectTxnType(this)">Debit</div>
          <div class="txn-type-opt" data-t="neutral" onclick="selectTxnType(this)">Neutral</div>
        </div>
      </div>
      <button class="add-txn-btn" onclick="addTransaction()">Add Transaction</button>
    </div>
    <div class="txn-list" id="txn-list">
      <div class="txn-empty">No client selected.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let clients = {};
let selectedKey = null;
let selectedTxnType = 'credit';
let isNewContract = false;
let newContractType = null;

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
function initDB(){
  setConnStatus('connecting');
  db.ref('clients').on('value', snap => {
    setConnStatus('connected');
    clients = snap.val() || {};
    renderClientList();
    updateStats();
    if(selectedKey && clients[selectedKey]) renderContractView(selectedKey);
  }, err => {
    setConnStatus('error');
    const el = document.getElementById('client-list');
    if(el) el.innerHTML = `<div style="padding:12px;font-size:10px;color:var(--red);line-height:1.6"><strong>Firebase error</strong><br>${err.code}<br><span style="color:var(--muted)">${err.message}</span></div>`;
    toast('Firebase: ' + err.code);
  });
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
const fmt = n => '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = s => { if(!s) return '—'; const d=new Date(s+'T12:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const round2 = n => Math.round(n*100)/100;
function slugify(name){ return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
function addMonths(dateStr, n){ const d=new Date(dateStr+'T12:00:00'); d.setDate(d.getDate()+n*28); return d.toISOString().split('T')[0]; }
function addDays(dateStr, n){ const d=new Date(dateStr+'T12:00:00'); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function setDefaultDates(){
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('txn-date').value = today;
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function setConnStatus(state){
  const el = document.getElementById('conn-status');
  if(!el) return;
  const map = { connecting:{label:'Connecting…',color:'#8c8577'}, connected:{label:'Live',color:'#4caf50'}, error:{label:'Error',color:'#ef5350'} };
  const s = map[state]||map.connecting;
  el.textContent = s.label;
  el.style.color = s.color;
}

function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════
// STATS
// ══════════════════════════════════════════
function updateStats(){
  const arr = Object.values(clients);
  document.getElementById('stat-total').textContent = arr.length||'0';
  document.getElementById('stat-active').textContent = arr.filter(c=>c.status!=='inactive'&&c.status!=='complete').length||'0';
  document.getElementById('stat-inactive').textContent = arr.filter(c=>c.status==='inactive').length||'0';
  document.getElementById('stat-std').textContent = arr.filter(c=>c.contractType==='standard').length||'0';
  document.getElementById('stat-abu').textContent = arr.filter(c=>c.contractType==='abu').length||'0';
}

// ══════════════════════════════════════════
// CLIENT LIST
// ══════════════════════════════════════════
function renderClientList(){
  const el = document.getElementById('client-list');
  const keys = Object.keys(clients);
  if(!keys.length){ el.innerHTML='<div style="font-size:10px;color:var(--muted);font-style:italic;padding:8px 0">No clients yet.</div>'; return; }
  el.innerHTML = keys.map(k=>{
    const c = clients[k];
    const badgeType = c.status==='inactive' ? 'inactive' : c.contractType;
    const badgeLabel = c.status==='inactive' ? 'Inactive' : c.contractType==='abu' ? 'ABU' : 'Standard';
    const sel = k===selectedKey ? 'selected' : '';
    return `<div class="client-card ${sel}" onclick="selectClient('${k}')">
      <div class="cc-top">
        <div class="cc-name">${esc(c.clientName||'Unknown')}</div>
        <div class="cc-badge ${badgeType}">${badgeLabel}</div>
      </div>
      <div class="cc-meta">${esc(c.uid||'No UID')} · ${fmtDate(c.contractType==='abu'?c.phase1?.startDate:c.startDate)}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// SELECT CLIENT
// ══════════════════════════════════════════
function selectClient(key){
  selectedKey = key;
  isNewContract = false;
  renderClientList();
  renderContractView(key);
  renderTransactions(key);
}

// ══════════════════════════════════════════
// CONTRACT VIEW — read mode
// ══════════════════════════════════════════
function renderContractView(key){
  const c = clients[key];
  if(!c) return;
  document.getElementById('main-title').textContent = c.clientName || 'Unknown';
  document.getElementById('main-actions').innerHTML = `
    <button class="cancel-btn" onclick="deleteClient('${key}')">Delete</button>
    <button class="save-btn" onclick="startEdit('${key}')">Edit Contract</button>
  `;

  const isStd = c.contractType === 'standard';
  const statusColor = c.status==='inactive' ? 'gold' : c.status==='complete' ? 'blue' : 'green';
  const statusLabel = c.status==='inactive' ? 'Inactive' : c.status==='complete' ? 'Complete' : 'Active';

  let html = `
    <div class="form-section">
      <div class="form-section-label">Identity</div>
      <div class="calc-preview">
        <div class="calc-row"><span class="calc-label">Client Name</span><span class="calc-val">${esc(c.clientName)}</span></div>
        <div class="calc-row"><span class="calc-label">Contract Type</span><span class="calc-val ${isStd?'blue':'violet'}">${isStd?'Standard':'Account Build-Up'}</span></div>
        <div class="calc-row"><span class="calc-label">Status</span><span class="calc-val ${statusColor}">${statusLabel}</span></div>
        <div class="calc-row"><span class="calc-label">UID</span><span class="calc-val" style="font-size:10px">${esc(c.uid||'Not set')}</span></div>
      </div>
    </div>`;

  if(isStd){
    html += `
      <div class="form-section">
        <div class="form-section-label">Contract Terms</div>
        <div class="calc-preview">
          <div class="calc-row"><span class="calc-label">Deposit Amount</span><span class="calc-val">${fmt(c.depositAmount)}</span></div>
          <div class="calc-row"><span class="calc-label">Origination Fee</span><span class="calc-val">${c.origFeeRate}% — ${fmt(c.origFee)}</span></div>

// ══════════════════════════════════════════
// STANDARD CALC PREVIEW
// ══════════════════════════════════════════
function calcStd(){
  const dep     = parseFloat(document.getElementById('e-deposit')?.value)||0;
  const fee     = parseFloat(document.getElementById('e-fee')?.value)||0;
  const yld     = parseFloat(document.getElementById('e-yield')?.value)||0;
  const months  = parseInt(document.getElementById('e-term')?.value)||0;
  const settle  = parseInt(document.getElementById('e-settle')?.value)||0;
  const start   = document.getElementById('e-start')?.value;
  const el      = document.getElementById('std-preview');
  if(!el) return;
  if(!dep||!yld||!months){ el.innerHTML='<div style="font-size:10px;color:var(--muted);font-style:italic">Fill in all fields to preview.</div>'; return; }

  const origFee  = round2(dep * (fee/100));
  const principal = round2(dep - origFee);
  let balance = principal;
  // Settlement dead weeks
  const settleWeeks = Math.ceil(settle/7);
  for(let m=1;m<=months;m++){
    for(let w=1;w<=4;w++){
      if(w===4) balance += balance*(yld/100);
    }
  }
  balance = round2(balance);
  const totalYield = round2(balance - principal);
  const annualYield = round2(yld*12);
  const matDate = start ? addMonths(start, months) : null;

  el.innerHTML = `
    <div class="calc-row"><span class="calc-label">Origination Fee</span><span class="calc-val">${fmt(origFee)} (${fee}%)</span></div>
    <div class="calc-row"><span class="calc-label">Starting Principal</span><span class="calc-val">${fmt(principal)}</span></div>
    <div class="calc-row"><span class="calc-label">Annual Yield Rate</span><span class="calc-val green">${annualYield}%</span></div>
    <div class="calc-row"><span class="calc-label">Maturity Date</span><span class="calc-val gold">${matDate?fmtDate(matDate):'—'}</span></div>
    <div class="calc-row"><span class="calc-label">Total Yield</span><span class="calc-val green">${fmt(totalYield)}</span></div>
    <div class="calc-row"><span class="calc-label">Maturity Value</span><span class="calc-val green">${fmt(balance)}</span></div>
    <div class="calc-row"><span class="calc-label">Return on Deposit</span><span class="calc-val green">${((totalYield/principal)*100).toFixed(2)}%</span></div>`;
}

// ══════════════════════════════════════════
// ABU CALC PREVIEW
// ══════════════════════════════════════════
function calcABU(){
  const target      = parseFloat(document.getElementById('e-target')?.value)||0;
  const weekly      = parseFloat(document.getElementById('e-weekly')?.value)||0;
  const buildYield  = parseFloat(document.getElementById('e-buildyield')?.value)||0;
  const settleWks   = parseInt(document.getElementById('e-settlewk')?.value)||0;
  const lockMonths  = parseInt(document.getElementById('e-lockmonths')?.value)||0;
  const lockYield   = parseFloat(document.getElementById('e-lockyield')?.value)||0;
  const startDate   = document.getElementById('e-start')?.value;
  const startBal    = parseFloat(document.getElementById('e-startbal')?.value)||0;
  const el          = document.getElementById('abu-preview');
  if(!el) return;
  if(!target||!weekly||!buildYield){ el.innerHTML='<div style="font-size:10px;color:var(--muted);font-style:italic">Fill in Phase I parameters to preview.</div>'; return; }

  // Run Phase 1 simulation (exact same logic as ABU simulator)
  let balance=startBal, totalDeposited=0, totalYieldBuild=0, week=0;
  while(true){
    week++;
    let incomingYield=0;
    const shouldCompound = week>settleWks && (week-settleWks)%4===0;
    if(shouldCompound){ incomingYield=balance*(buildYield/100); totalYieldBuild+=incomingYield; }
    const prev=balance;
    balance+=weekly+incomingYield;
    totalDeposited+=weekly;
    if(balance>=target){
      const dp=Math.abs(prev-target), dn=Math.abs(balance-target);
      if(dn>=dp){ balance-=weekly+incomingYield; totalDeposited-=weekly; if(shouldCompound)totalYieldBuild-=incomingYield; week--; break; }
    }
    if(week>1000) break;
  }
  balance=round2(balance); totalDeposited=round2(totalDeposited); totalYieldBuild=round2(totalYieldBuild);

  const p1MatDate = startDate ? addDays(startDate, (week-1) * 7) : null;

  // Phase 2
  let lockFinal=balance, lockYieldEarned=0;
  if(lockMonths&&lockYield){
    for(let m=1;m<=lockMonths;m++) lockFinal+=lockFinal*(lockYield/100);
    lockFinal=round2(lockFinal);
    lockYieldEarned=round2(lockFinal-balance);
  }
  const p2MatDate = p1MatDate && lockMonths ? addDays(p1MatDate, lockMonths * 28) : null;

  el.innerHTML = `
    <div class="calc-row"><span class="calc-label">Weeks to Target</span><span class="calc-val gold">${week} wks (~${(week/4.33).toFixed(1)} mo)</span></div>
    <div class="calc-row"><span class="calc-label">Total Deposited</span><span class="calc-val">${fmt(totalDeposited)}</span></div>
    <div class="calc-row"><span class="calc-label">Build Yield Earned</span><span class="calc-val green">${fmt(totalYieldBuild)}</span></div>
    <div class="calc-row"><span class="calc-label">Phase I Final Balance</span><span class="calc-val green">${fmt(balance)}</span></div>
    <div class="calc-row"><span class="calc-label">Phase I Matures</span><span class="calc-val gold">${p1MatDate?fmtDate(p1MatDate):'—'}</span></div>
    ${lockMonths&&lockYield?`
    <div class="calc-row"><span class="calc-label">Lock Yield Earned</span><span class="calc-val violet">${fmt(lockYieldEarned)}</span></div>
    <div class="calc-row"><span class="calc-label">Lock Final Balance</span><span class="calc-val green">${fmt(lockFinal)}</span></div>
    <div class="calc-row"><span class="calc-label">Phase II Matures</span><span class="calc-val gold">${p2MatDate?fmtDate(p2MatDate):'—'}</span></div>`:''}`;
}

// ══════════════════════════════════════════
// TRANSACTION AUTO-GENERATION
// ══════════════════════════════════════════
function autoGenABUTransactions(start, weeklyDeposit, buildYieldRate, settleWks, weeksToTarget, startingBalance, lastDepositDate, frozenDate) {
  const txns = {};
  const today = new Date();
  let balance = startingBalance || 0;
  let monthCount = 0;
  let tIdx = 1;

  const lastDepositCutoff = lastDepositDate ? new Date(lastDepositDate + 'T23:59:59') : null;
  const frozenCutoff      = frozenDate      ? new Date(frozenDate      + 'T23:59:59') : null;
  const hardStop = frozenCutoff || today;

  if (startingBalance > 0) {
    txns['t' + tIdx++] = { date: start, description: 'Starting balance — yield credit', amount: round2(startingBalance), type: 'yield' };
  }

  for (let wk = 1; wk <= weeksToTarget; wk++) {
    const txDate = new Date(start + 'T12:00:00');
    txDate.setDate(txDate.getDate() + (wk - 1) * 7);
    if (txDate > hardStop) break;
    const dateStr = txDate.toISOString().split('T')[0];
    const shouldCompound = wk > settleWks && (wk - settleWks) % 4 === 0;

    if (shouldCompound) {
      const yieldAmt = round2(balance * (buildYieldRate / 100));
      monthCount++;
      txns['t' + tIdx++] = { date: dateStr, description: 'Monthly yield compounded — Month ' + monthCount, amount: yieldAmt, type: 'credit' };
      balance += yieldAmt;
    }

    const depositAllowed = !lastDepositCutoff || txDate <= lastDepositCutoff;
    if (depositAllowed) {
      balance += weeklyDeposit;
      txns['t' + tIdx++] = { date: dateStr, description: 'Weekly contribution — Week ' + wk, amount: weeklyDeposit, type: 'credit' };
    }
  }
  return txns;
}

function autoGenStdTransactions(start, depositAmount, origFee, feeRate) {
  const txns = {};
  txns['t1'] = { date: start, description: 'Initial deposit', amount: depositAmount, type: 'credit' };
  if (origFee > 0) {
    txns['t2'] = { date: start, description: 'Origination fee (' + feeRate + '%)', amount: origFee, type: 'debit' };
  }
  return txns;
}

  const status = (document.querySelector('.status-opt.active')||{}).dataset?.s || 'active';
  if(!name){ toast('Client name required'); return; }

  const dbKey = key || slugify(name);
  const existing = clients[dbKey] || {};
  let record = { clientName:name, uid, status, contractType:type, exportedAt: new Date().toISOString().split('T')[0] };

  if(type==='standard'){
    const dep    = parseFloat(document.getElementById('e-deposit').value)||0;
    const fee    = parseFloat(document.getElementById('e-fee').value)||0;
    const yld    = parseFloat(document.getElementById('e-yield').value)||0;
    const months = parseInt(document.getElementById('e-term').value)||0;
    const settle = parseInt(document.getElementById('e-settle').value)||0;
    const start  = document.getElementById('e-start').value;
    if(!dep||!yld||!months||!start){ toast('Fill in all required fields'); return; }

    const origFee   = round2(dep*(fee/100));
    const principal = round2(dep-origFee);
    let balance = principal;
    for(let m=1;m<=months;m++) for(let w=1;w<=4;w++) if(w===4) balance+=balance*(yld/100);
    balance=round2(balance);

    const matDateOverride = document.getElementById('e-mat-override')?.value || null;
    const matValOverride  = parseFloat(document.getElementById('e-matval-override')?.value) || null;
    const finalMatDate    = matDateOverride || addMonths(start, months);
    const finalMatValue   = matValOverride  !== null && !isNaN(matValOverride) ? round2(matValOverride) : balance;
    const finalTotalYield = round2(finalMatValue - principal);

    // Build weekly chart data
    const labels=[], principals=[], yields=[];
    let b=principal;
    labels.push('Week 0'); principals.push(principal); yields.push(0);
    const sWeeks=Math.ceil(settle/7);
    for(let w=1;w<=sWeeks;w++){ labels.push(`Wk ${w} (setup)`); principals.push(principal); yields.push(0); }
    for(let m=1;m<=months;m++) for(let w=1;w<=4;w++){
      if(w===4) b+=b*(yld/100);
      const wn=labels.length; let lbl=`Wk ${wn}`; if(w===4) lbl+=` ✦M${m}`;
      labels.push(lbl); principals.push(principal); yields.push(round2(Math.max(0,b-principal)));
    }

    Object.assign(record,{
      depositAmount:dep, origFeeRate:fee, origFee:origFee, principal:principal,
      startDate:start, termMonths:months, settlementDays:settle,
      maturityDate:finalMatDate, maturityDateOverride:matDateOverride||null,
      monthlyYieldRate:yld, annualYieldRate:round2(yld*12),
      maturityValue:finalMatValue, maturityValueOverride:matValOverride||null,
      totalYield:finalTotalYield, totalReturnPct:round2((finalTotalYield/principal)*100),
      weeklyChartData:{labels,principal:principals,yieldLayer:yields},
      transactions: (existing.transactions && Object.keys(existing.transactions).length > 0)
        ? existing.transactions
        : autoGenStdTransactions(start, dep, origFee, fee)
    });

  } else {
    const target    = parseFloat(document.getElementById('e-target').value)||0;
    const weekly    = parseFloat(document.getElementById('e-weekly').value)||0;
    const buildYld  = parseFloat(document.getElementById('e-buildyield').value)||0;
    const settleWks = parseInt(document.getElementById('e-settlewk').value)||0;
    const lockMo    = parseInt(document.getElementById('e-lockmonths').value)||0;
    const lockYld   = parseFloat(document.getElementById('e-lockyield').value)||0;
    const start     = document.getElementById('e-start').value;
    const startBal  = parseFloat(document.getElementById('e-startbal')?.value)||0;
    if(!target||!weekly||!buildYld||!start){ toast('Fill in all required Phase I fields'); return; }

    // Run Phase 1
    let bal=startBal, totDep=0, totYB=0, wk=0;
    const labels1=['Week 0'], dep1=[0], yld1=[0];
    let curDate=new Date(start+'T12:00:00');
    while(true){
      wk++;
      let iy=0; const sc=wk>settleWks&&(wk-settleWks)%4===0;
      if(sc){iy=bal*(buildYld/100);totYB+=iy;}
      const prev=bal; bal+=weekly+iy; totDep+=weekly;
      if(bal>=target){const dp=Math.abs(prev-target),dn=Math.abs(bal-target);if(dn>=dp){bal-=weekly+iy;totDep-=weekly;if(sc)totYB-=iy;wk--;break;}}
      let lbl=`Wk ${wk}`;
      curDate.setDate(curDate.getDate()+7);
      labels1.push(`Wk ${wk}`); dep1.push(round2(totDep)); yld1.push(round2(totYB));
      if(wk>1000) break;
    }
    bal=round2(bal); totDep=round2(totDep); totYB=round2(totYB);
    const overrideP1Mat = document.getElementById('e-p1mat')?.value || null;
    const overrideP2Mat = document.getElementById('e-p2mat')?.value || null;
    const storedP1Mat = existing?.phase1?.phase1MaturityDate || null;
    const storedP2Mat = existing?.phase2?.lockMaturityDate || null;
    const p1Mat = overrideP1Mat || storedP1Mat || addDays(start, (wk-1) * 7);

    // Phase 2
    let lockBal=bal;
    const bLabels=['Start'],dL=[totDep],bL=[totYB],lL=[0];
    for(let m=1;m<=lockMo;m++){
      lockBal+=lockBal*(lockYld/100);
      bLabels.push(`Month ${m}`); dL.push(totDep); bL.push(totYB); lL.push(round2(lockBal-bal));
    }
    lockBal=round2(lockBal);
    const p2Mat = overrideP2Mat || storedP2Mat || addDays(p1Mat, lockMo * 28);

    Object.assign(record,{
      phase1:{
        targetBalance:target, weeklyDeposit:weekly, buildYieldRateMonthly:buildYld,
        startDate:start, settleWeeks:settleWks, weeksToTarget:wk,
        totalDeposited:totDep, buildYieldEarned:totYB, finalBalance:bal,
        phase1MaturityDate:p1Mat, startingBalance:startBal
      },
      phase2:{
        lockMonths:lockMo, lockYieldRateMonthly:lockYld,
        lockStartDate:p1Mat, lockMaturityDate:p2Mat,
        lockFinalBalance:lockBal, lockYieldEarned:round2(lockBal-bal)
      },
      weeklyChartData:{labels:labels1, deposited:dep1, yieldLayer:yld1},
      barChartData:{labels:bLabels, depLayer:dL, buildLayer:bL, lockLayer:lL},
      transactions: (existing.transactions && Object.keys(existing.transactions).length > 0)
        ? existing.transactions
        : autoGenABUTransactions(start, weekly, buildYld, settleWks, wk, startBal,
            status==='inactive' ? (document.getElementById('e-lastdeposit')?.value||null) : null,
            status==='inactive' ? (document.getElementById('e-frozendate')?.value||null) : null)
    });

    // Inactive fields
    if(status==='inactive'){
      record.lastDepositDate      = document.getElementById('e-lastdeposit')?.value||'';
      record.frozenDate           = document.getElementById('e-frozendate')?.value||'';
      record.frozenBalance        = parseFloat(document.getElementById('e-frozenbal')?.value)||0;
      record.frozenYield          = parseFloat(document.getElementById('e-frozenyield')?.value)||0;
      record.totalDepositedActual = parseFloat(document.getElementById('e-actualdep')?.value)||0;
      record.activeStart          = document.getElementById('e-activestart')?.value||'';
      record.activeThrough        = document.getElementById('e-activethrough')?.value||'';
    }
  }

  db.ref('clients/'+dbKey).set(record).then(()=>{
    selectedKey = dbKey;
    isNewContract = false;
    toast('Saved — '+name);
    // Auto-wire UID into login.html via Electron
    if(uid && window.electronAPI){
      const loginPage = type === 'abu' ? 'abu.html' : 'std.html';
      window.electronAPI.addLoginUID(uid, loginPage)
        .then(res => {
          if(res.ok) toast('Login wiring OK — ' + uid.slice(0,8) + '… (' + res.reason + ')');
          else { toast('Login wiring FAILED: ' + res.reason); alert('Login wiring FAILED:\n' + res.reason); }
        })
        .catch(err => {
          toast('Login IPC error: ' + err.message);
          alert('Login IPC error:\n' + err.message);
        });
    } else {
      toast('WARNING: electronAPI not available — login.html was NOT updated');
      alert('WARNING: window.electronAPI is not available.\nLogin.html was NOT updated.\nUID: ' + uid);
    }
  }).catch(e=>toast('Error: '+e.message));
}

// ══════════════════════════════════════════
// DELETE CLIENT
// ══════════════════════════════════════════
function deleteClient(key){
  if(!confirm('Delete '+clients[key]?.clientName+'? This cannot be undone.')) return;
  db.ref('clients/'+key).remove().then(()=>{
    selectedKey=null;
    renderEmpty();
    document.getElementById('txn-client-name').textContent='No client selected';
    document.getElementById('txn-add-form').style.display='none';
    document.getElementById('txn-list').innerHTML='<div class="txn-empty">No client selected.</div>';
    toast('Deleted');
  });
}

function renderEmpty(){
  document.getElementById('main-title').textContent='Select a Client';
  document.getElementById('main-actions').innerHTML='';
  document.getElementById('main-body').innerHTML=`<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-text">Select a client or create new</div></div>`;
}

// ══════════════════════════════════════════
// TRANSACTIONS
// ══════════════════════════════════════════
function renderTransactions(key){
  const c = clients[key];
  if(!c){ return; }
  document.getElementById('txn-client-name').textContent = c.clientName;
  document.getElementById('txn-add-form').style.display = 'flex';
  document.getElementById('txn-add-form').style.flexDirection = 'column';

  const txns = c.transactions || {};
  const el = document.getElementById('txn-list');
  if(!Object.keys(txns).length){ el.innerHTML='<div class="txn-empty">No transactions yet.</div>'; return; }

  const now = new Date();
  const list = Object.entries(txns)
    .filter(([,t]) => new Date(t.date+'T12:00:00') <= now)
    .sort(([,a],[,b]) => new Date(b.date)-new Date(a.date));

  const future = Object.entries(txns)
    .filter(([,t]) => new Date(t.date+'T12:00:00') > now)
    .sort(([,a],[,b]) => new Date(a.date)-new Date(b.date));

  const renderRow = ([txKey, t]) => `
    <div class="txn-row">
      <div class="txn-date">${fmtDate(t.date)}</div>
      <div class="txn-desc">${esc(t.description)}</div>
      <div class="txn-amt ${t.type}">${t.type==='credit'?'+':t.type==='debit'?'−':''}${t.amount>0?fmt(Math.abs(t.amount)):'—'}</div>
      <button class="txn-del" onclick="deleteTxn('${key}','${txKey}')">×</button>
    </div>`;

  el.innerHTML = (future.length ? `<div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--amber);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:6px">Scheduled (future)</div>${future.map(renderRow).join('')}<div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:6px">History</div>` : '') + (list.length ? list.map(renderRow).join('') : '<div class="txn-empty">No past transactions.</div>');
}

function selectTxnType(el){
  document.querySelectorAll('.txn-type-opt').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  selectedTxnType = el.dataset.t;
}

function addTransaction(){
  if(!selectedKey){ toast('Select a client first'); return; }
  const date  = document.getElementById('txn-date').value;
  const desc  = document.getElementById('txn-desc').value.trim();
  const amt   = parseFloat(document.getElementById('txn-amount').value)||0;
  if(!date||!desc){ toast('Date and description required'); return; }

  const txKey = 't'+Date.now();
  db.ref('clients/'+selectedKey+'/transactions/'+txKey).set({
    date, description:desc, amount:round2(amt), type:selectedTxnType
  }).then(()=>{
    document.getElementById('txn-desc').value='';
    document.getElementById('txn-amount').value='';
    toast('Transaction added');
  });
}

function deleteTxn(clientKey, txKey){
  if(!confirm('Delete this transaction?')) return;
  db.ref('clients/'+clientKey+'/transactions/'+txKey).remove().then(()=>toast('Deleted'));
}

document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if(e.key==='F12')e.preventDefault();
  if(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))e.preventDefault();
  if(e.ctrlKey&&e.key==='U')e.preventDefault();
});

initDB();
setDefaultDates();
</script>
