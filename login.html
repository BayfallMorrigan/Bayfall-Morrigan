<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lender Login — Bayfall Morrigan</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    authDomain: "client-database-aeff2.firebaseapp.com",
    databaseURL: "https://client-database-aeff2-default-rtdb.firebaseio.com",
    projectId: "client-database-aeff2",
    storageBucket: "client-database-aeff2.firebasestorage.app",
    messagingSenderId: "667656292083",
    appId: "1:667656292083:web:0238cc4046fe8acd3c1986"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.database();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:   #080808;
  --white:   #f0ede8;
  --mid:     #7a7670;
  --dim:     #3a3830;
  --rule:    #1a1a1a;
  --rule2:   #2a2824;
  --gold:    #8a6a2a;
  --display: 'Cormorant Garamond', Georgia, serif;
  --body:    'EB Garamond', Georgia, serif;
}

html, body {
  background: var(--black);
  color: var(--white);
  font-family: var(--body);
  font-size: 17px;
  line-height: 1.8;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--black);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 64px;
  height: 80px;
}

.logo-img {
  height: auto;
  width: 140px;
  display: block;
  filter: invert(1) brightness(0.7);
}


.back-link {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  text-decoration: none;
  transition: color 0.25s;
}

.back-link:hover { color: rgba(255,255,255,0.6); }

/* ── PAGE ── */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 72px 24px 60px;
}

/* ── LOGIN CARD ── */
.login-wrap {
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.login-mark {
  font-family: var(--display);
  font-size: 13px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: rgba(240,237,232,0.4);
  font-weight: 400;
  text-align: center;
  margin-bottom: 4px;
}

.login-rule {
  width: 32px;
  height: 1px;
  background: var(--rule2);
  margin: 20px auto;
}

.login-heading {
  font-family: var(--display);
  font-size: clamp(28px, 4vw, 38px);
  font-weight: 300;
  color: var(--white);
  letter-spacing: 0.02em;
  text-align: center;
  line-height: 1.1;
  margin-bottom: 6px;
}

.login-heading em { font-style: italic; }

.login-sub {
  font-family: var(--body);
  font-size: 13px;
  color: var(--mid);
  text-align: center;
  font-style: italic;
  letter-spacing: 0.06em;
  margin-bottom: 44px;
}

/* ── FORM ── */
.form-fields {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 28px;
  margin-bottom: 32px;
}

.field-wrap {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.field-label {
  font-family: var(--body);
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--mid);
}

.field-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--rule2);
  padding: 10px 0;
  font-family: var(--body);
  font-size: 16px;
  color: var(--white);
  outline: none;
  width: 100%;
  transition: border-color 0.25s;
  -webkit-appearance: none;
}

.field-input:focus { border-color: var(--dim); }

.field-input::placeholder { color: var(--rule2); }

/* ── SUBMIT ── */
.login-btn {
  width: 100%;
  background: transparent;
  border: 1px solid var(--rule2);
  padding: 13px;
  font-family: var(--display);
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: rgba(240,237,232,0.55);
  cursor: pointer;
  transition: all 0.25s;
  margin-top: 4px;
}

.login-btn:hover {
  border-color: var(--dim);
  color: var(--white);
}

.login-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* ── ERROR ── */
.error-msg {
  font-family: var(--body);
  font-size: 12px;
  color: #8a4a4a;
  letter-spacing: 0.08em;
  font-style: italic;
  text-align: center;
  min-height: 18px;
  margin-top: 16px;
}

/* ── LOADING ── */
.loading-msg {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mid);
  text-align: center;
  margin-top: 16px;
  min-height: 18px;
}

/* ── FOOTER NOTE ── */
.login-note {
  margin-top: 48px;
  font-family: var(--body);
  font-size: 11px;
  color: #5a5650;
  text-align: center;
  letter-spacing: 0.06em;
  font-style: italic;
  line-height: 1.7;
}

/* ── TABLET ── */
@media (max-width: 960px) {
  header { padding: 0 32px; }
  .page { padding: 80px 24px 60px; }
}

/* ── HAMBURGER ── */
.hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
  z-index: 200;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 1px;
  background: rgba(255,255,255,0.6);
  transition: transform 0.3s, opacity 0.3s;
  transform-origin: center;
}
.hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.mobile-menu {
  display: none;
  position: fixed;
  top: 64px;
  left: 0; right: 0;
  background: var(--black);
  border-bottom: 1px solid var(--rule);
  flex-direction: column;
  padding: 20px 20px 28px;
  gap: 0;
  z-index: 99;
  transform: translateY(-8px);
  opacity: 0;
  transition: transform 0.25s ease, opacity 0.25s ease;
  pointer-events: none;
}
.mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
.mobile-menu a {
  font-family: var(--body);
  font-size: 13px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  text-decoration: none;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule);
  transition: color 0.2s;
  cursor: pointer;
}
.mobile-menu a:last-child { border-bottom: none; }
.mobile-menu a:hover { color: var(--white); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  header { padding: 0 20px; height: 64px; }
  .logo-img { width: 108px; }
  .back-link { display: none; }
  .hamburger { display: flex; }
  .mobile-menu { display: flex; }
  .page { padding: 72px 20px 48px; }
  .login-wrap { max-width: 100%; }
  .login-heading { font-size: clamp(24px, 8vw, 34px); }
}
</style>
</head>
<body>

<header>
  <a href="https://www.bayfallmorrigan.com"><img class="logo-img" src="logopng.png" alt="Bayfall Morrigan"></a>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <a class="back-link" href="https://www.bayfallmorrigan.com">← Return to Site</a>
</header>

<div class="mobile-menu" id="mobile-menu">
  <a href="https://www.bayfallmorrigan.com" onclick="closeMenu()">Home</a>
  <a class="active" onclick="closeMenu()">My Account</a>
</div>

<div class="page">
  <div class="login-wrap">
    <div class="login-mark">Bayfall Morrigan</div>
    <div class="login-rule"></div>
    <div class="login-heading">Private Lender <em>Access</em></div>
    <div class="login-sub">Enter your credentials to view your account</div>

    <div class="form-fields">
      <div class="field-wrap">
        <div class="field-label">Email Address</div>
        <input class="field-input" type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field-wrap">
        <div class="field-label">Password</div>
        <input class="field-input" type="password" id="passwordInput" placeholder="· · · · · · · ·" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()">
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="handleLogin()">Enter</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="loading-msg" id="loadingMsg"></div>

    <div class="login-note">
      Credentials are assigned upon contract execution.<br>
      Contact us if you require access assistance.
    </div>
  </div>
</div>

<script>
// ── UID → client dashboard page mapping ──
// Add each client's UID and their dashboard filename here
const CLIENT_PAGES = {
  'yNdpQ4uPxxZEWgE0rYndvlSwYX13': 'abu.html',
  'gLw4FvzTWkVLAi5J8B0rps0RDl02': 'abu.html',
  '7QYYPj4C44ftgM1sCs6PrNYs23V2': 'std.html',
  'Ij2X7nh6D0Mc8hssMqVVwTF4Csp1': 'abu.html',
  'x96iaScGIPenKPbpKJcXsGyw2A32': 'std.html',
  'Y1e1zfpHxDgGQh4anClEDD5cYbC2': 'std.html',
  '7uxQMi394WYUwoO1rQXspRf6lYA3': 'abu.html',
};

async function handleLogin() {
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn      = document.getElementById('loginBtn');
  const errorEl  = document.getElementById('errorMsg');
  const loadEl   = document.getElementById('loadingMsg');

  errorEl.textContent  = '';
  loadEl.textContent   = '';

  if (!email || !password) {
    errorEl.textContent = 'Please enter your email and password.';
    return;
  }

  btn.disabled = true;
  loadEl.textContent = 'Verifying credentials...';

  try {
    const result = await auth.signInWithEmailAndPassword(email, password);
    const uid = result.user.uid;
    const page = CLIENT_PAGES[uid];

    if (page) {
      loadEl.textContent = 'Access granted. Redirecting...';
      setTimeout(() => { window.location.href = page; }, 800);
    } else {
      await auth.signOut();
      errorEl.textContent = 'Account not found. Please contact us.';
      btn.disabled = false;
      loadEl.textContent = '';
    }
  } catch (err) {
    btn.disabled = false;
    loadEl.textContent = '';
    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
      errorEl.textContent = 'Incorrect email or password.';
    } else if (err.code === 'auth/too-many-requests') {
      errorEl.textContent = 'Too many attempts. Please try again later.';
    } else {
      errorEl.textContent = 'An error occurred. Please try again.';
    }
  }
}

function toggleMenu() {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('mobile-menu').classList.toggle('open');
}
function closeMenu() {
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('mobile-menu').classList.remove('open');
}

// If already logged in, redirect immediately
auth.onAuthStateChanged(user => {
  if (user) {
    const page = CLIENT_PAGES[user.uid];
    if (page) window.location.href = page;
  }
});
</script>
</body>
</html>
